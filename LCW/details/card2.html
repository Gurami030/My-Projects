<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <!-----ჰედერიი------->
    <header>
        <!----ლოგოს კონტაინტერი----->
        <div class="container">
            <a href="../index.html"><img src="../images/LCW logo.png" alt="LCW logo" class="container_logo"></a>
        </div>
        <!--ნავიგაციის ლისთი-->
        <nav>
            <ul class="list">
                <li><a href="#" class="list_item">Home</a></li>
                <li><a href="#" class="list_item">About Us</a></li>
                <li><a href="#" class="list_item">Contact Us</a></li>

        <!---ღილაკი-->
        <div>

            <p class="gadasvla">Home > <span class="dtls">Details page</span></p>

            <div>
                <img src="../images/2.webp" alt="prduct photo" class="dtls_img">

                    <button class="btns_size">M</button>
                    <button class="btns_size">L</button>
                    <button class="btns_size">XL</button>

            </div>

     <footer>

      <p>&copy; 2024 copyright. All rights reserved!</p>
