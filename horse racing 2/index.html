<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Racing Simulation with Dynamic Coefficients</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
        }

        .race-track {
            width: 80%;
            height: 200px;
            border: 2px solid #333;
            position: relative;
            margin: 20px auto;
            background-color: #e0e0e0;
        }

        .horse {
            width: 50px;
            height: 50px;
            position: absolute;
            bottom: 0;
            border-radius: 10px;
        }

        #horse1 { background-color: red; top: 0; }
        #horse2 { background-color: blue; top: 50px; }
        #horse3 { background-color: green; top: 100px; }
        #horse4 { background-color: yellow; top: 150px; }

        button {
            margin: 20px;
            padding: 10px 20px;
            font-size: 16px;
        }

        h2 {
            margin-top: 20px;
        }

        .coefficients {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="race-track">
        <div class="horse" id="horse1"></div>
        <div class="horse" id="horse2"></div>
        <div class="horse" id="horse3"></div>
        <div class="horse" id="horse4"></div>
    </div>
    <button id="startRace">Start Race!</button>
    <h2 id="winner"></h2>

    <div class="coefficients">
        <h3>Live Coefficients:</h3>
        <p id="coef1">Horse 1: 2.0</p>
        <p id="coef2">Horse 2: 1.8</p>
        <p id="coef3">Horse 3: 2.5</p>
        <p id="coef4">Horse 4: 3.0</p>
    </div>

    <script>
        let raceStarted = false;

        // Coefficients for each horse
        const coefficients = {
            horse1: 2.0,
            horse2: 1.8,
            horse3: 2.5,
            horse4: 3.0
        };

        document.getElementById('startRace').addEventListener('click', startRace);

        function startRace() {
            if (raceStarted) return; // Prevent starting multiple races
            raceStarted = true;

            const horses = [
                document.getElementById('horse1'),
                document.getElementById('horse2'),
                document.getElementById('horse3'),
                document.getElementById('horse4')
            ];
            const raceTrackWidth = document.querySelector('.race-track').clientWidth;
            const raceEnd = raceTrackWidth - 50; // 50px is the horse width
            let raceInterval;

            // Reset horses' positions
            horses.forEach(horse => {
                horse.style.left = '0px';
            });

            document.getElementById('winner').innerText = '';

            raceInterval = setInterval(() => {
                horses.forEach((horse, index) => {
                    const move = Math.random() * 10; // Random move between 0 and 10 pixels
                    const currentPosition = parseInt(horse.style.left) + move;
                    horse.style.left = currentPosition + 'px';

                    // Update coefficients dynamically
                    updateCoefficients();

                    // Check for a winner
                    if (currentPosition >= raceEnd) {
                        clearInterval(raceInterval);
                        document.getElementById('winner').innerText = `The winner is ${horse.id}!`;
                    }
                });
            }, 100); // Update every 100ms
        }

        function updateCoefficients() {
            Object.keys(coefficients).forEach(horse => {
                coefficients[horse] = (Math.random() * 2 + 1).toFixed(2); // Random coefficient between 1 and 3
                document.getElementById(`coef${horse.charAt(horse.length - 1)}`).innerText = `${horse}: ${coefficients[horse]}`;
            });
        }
    </script>
</body>
</html>
